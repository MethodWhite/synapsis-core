name: CI

on:
  push:
    branches: [main, clean]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: synapsis-core

      - uses: actions/checkout@v6
        with:
          repository: MethodWhite/prusia-vault
          path: prusia-vault

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapsis-core

      - name: Check formatting
        working-directory: synapsis-core
        run: cargo fmt -p synapsis-core -- --check

      - name: Clippy lint
        working-directory: synapsis-core
        run: cargo clippy --all-targets --all-features -- -D warnings 2>&1 || echo "::warning::Clippy (non-blocking)"

      - name: Build
        working-directory: synapsis-core
        run: cargo build --release

      - name: Test
        working-directory: synapsis-core
        run: cargo test --release --lib 2>&1 || echo "::warning::Tests (non-blocking)"

  build:
    name: Build (${{ matrix.name }})
    needs: check-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
        with:
          path: synapsis-core

      - uses: actions/checkout@v6
        with:
          repository: MethodWhite/prusia-vault
          path: prusia-vault

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapsis-core

      - name: Build release
        working-directory: synapsis-core
        run: cargo build --release --target ${{ matrix.target }}
