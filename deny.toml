[advisories]
ignore = []
severity-threshold = "low"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
deny = [
    "GPL-3.0",
    "GPL-2.0",
    "AGPL-3.0",
    "LGPL-3.0",
]
copyleft = "deny"

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = [
    { name = "serde_derive", version = "1" },
]
